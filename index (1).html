<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Management System</title>
    <style>
        :root {
            --primary: #e50914;
            --dark-bg: #141414;
            --card-bg: #1f1f1f;
            --text-light: #ffffff;
            --text-gray: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 15px;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            height: fit-content;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 1.4rem;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        button:hover {
            background: #b80710;
        }

        .filter-section {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .filter-section select {
            max-width: 200px;
        }

        .movie-table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #333;
        }

        th {
            background-color: #262626;
            color: var(--text-gray);
            font-weight: 600;
        }

        tr:hover {
            background-color: #262626;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }

        .status-unwatched {
            background-color: #f39c12;
            color: #000;
        }

        .status-watched {
            background-color: #2ecc71;
            color: #fff;
        }

        .btn-delete {
            background: #c0392b;
            padding: 6px 12px;
            font-size: 0.85rem;
            width: auto;
            display: inline-block;
        }

        .btn-delete:hover {
            background: #e74c3c;
        }

        .empty-message {
            text-align: center;
            color: var(--text-gray);
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Movie Management System</h1>
    </header>

    <div class="main-content">
        <!-- Add Movie Panel -->
        <div class="panel">
            <h2>Add New Movie</h2>
            <form id="movieForm">
                <div class="form-group">
                    <label for="title">Movie Title</label>
                    <input type="text" id="title" required placeholder="e.g., Inception">
                </div>
                <div class="form-group">
                    <label for="genre">Genre</label>
                    <select id="genre" required>
                        <option value="">Select Genre</option>
                        <option value="Action">Action</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Drama">Drama</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Thriller">Thriller</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="year">Release Year</label>
                    <input type="number" id="year" required min="1888" max="2030" placeholder="e.g., 2010">
                </div>
                <button type="submit">Add Movie</button>
            </form>
        </div>

        <!-- Movie List Inventory Panel -->
        <div class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h2>Movie Inventory</h2>
                <div class="filter-section">
                    <label for="filterGenre">Filter:</label>
                    <select id="filterGenre" onchange="displayMovies()">
                        <option value="All">All Genres</option>
                        <option value="Action">Action</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Drama">Drama</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Thriller">Thriller</option>
                    </select>
                </div>
            </div>

            <div class="movie-table-wrapper">
                <table id="movieTable">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Genre</th>
                            <th>Year</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="movieList">
                        <!-- Dynamic rows injected here -->
                    </tbody>
                </table>
                <div id="emptyState" class="empty-message" style="display: none;">
                    No movies found. Add some to get started!
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Initial mock data store
    let movies = [
        { id: 1, title: "The Dark Knight", genre: "Action", year: 2008, watched: true },
        { id: 2, title: "Interstellar", genre: "Sci-Fi", year: 2014, watched: false }
    ];

    const movieForm = document.getElementById('movieForm');
    const movieList = document.getElementById('movieList');
    const emptyState = document.getElementById('emptyState');
    const filterGenre = document.getElementById('filterGenre');

    // Handle form submission to add movie
    movieForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const title = document.getElementById('title').value.trim();
        const genre = document.getElementById('genre').value;
        const year = document.getElementById('year').value;

        const newMovie = {
            id: Date.now(), // Unique ID
            title: title,
            genre: genre,
            year: parseInt(year),
            watched: false
        };

        movies.push(newMovie);
        movieForm.reset();
        displayMovies();
    });

    // Toggle movie watch status
    function toggleStatus(id) {
        movies = movies.map(movie => {
            if(movie.id === id) {
                return { ...movie, watched: !movie.watched };
            }
            return movie;
        });
        displayMovies();
    }

    // Delete a movie from the inventory array
    function deleteMovie(id) {
        movies = movies.filter(movie => movie.id !== id);
        displayMovies();
    }

    // Render the table records dynamically
    function displayMovies() {
        const selectedGenre = filterGenre.value;
        movieList.innerHTML = '';

        // Apply drop-down filtering logic
        const filteredMovies = movies.filter(movie => {
            return selectedGenre === 'All' || movie.genre === selectedGenre;
        });

        // Toggle visibility of empty information view
        if (filteredMovies.length === 0) {
            emptyState.style.display = 'block';
            document.getElementById('movieTable').style.display = 'none';
            return;
        } else {
            emptyState.style.display = 'none';
            document.getElementById('movieTable').style.display = 'table';
        }

        // Generate rows
        filteredMovies.forEach(movie => {
            const row = document.createElement('tr');
            
            const statusClass = movie.watched ? 'status-watched' : 'status-unwatched';
            const statusText = movie.watched ? 'Watched' : 'Unwatched';

            row.innerHTML = `
